name: 功能建议
description: 提议符合 Norn 轻量定位的新能力或体验改进
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        感谢建议。较大的功能会先讨论产品边界、维护成本和替代方案。
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 请描述当前工作流中的具体困难，而不只是功能名称
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述理想交互、范围和预期结果
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你目前如何处理这个问题？是否考虑过其他方案？
  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 可添加示意图、相关项目或使用场景
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，未发现相同建议
          required: true
        - label: 该建议与轻量代码编辑或简单 Git 工作流有关
          required: true
