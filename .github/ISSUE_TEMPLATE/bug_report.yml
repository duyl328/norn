name: Bug 报告
description: 报告可复现的错误或异常行为
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。提交前请先搜索现有 Issue，并避免包含令牌、凭据或私人文件内容。
  - type: input
    id: version
    attributes:
      label: Norn 版本
      description: 可在“关于 Norn”中查看
      placeholder: 例如 0.2.4
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Windows 11
        - Windows 10
        - macOS Apple Silicon
        - macOS Intel
        - Linux
        - 其他
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 请清楚说明发生了什么
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开……
        2. 点击……
        3. 看到……
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 请移除路径、令牌、仓库地址等敏感信息
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，未发现相同问题
          required: true
        - label: 我没有在报告中包含凭据或其他敏感信息
          required: true
