name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify tag and project versions
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node scripts/check-release-version.mjs

      - name: Verify updater signing key is configured
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "Missing repository secret: TAURI_SIGNING_PRIVATE_KEY" >&2
            exit 1
          fi

  build:
    name: Build (${{ matrix.name }})
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - name: Windows x64
            platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Norn ${{ github.ref_name }}
          releaseBody: |
            Norn ${{ github.ref_name }}

            安装包由 GitHub Actions 自动构建。
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          tauriScript: pnpm tauri
          retryAttempts: 2
          args: ${{ matrix.args }}
