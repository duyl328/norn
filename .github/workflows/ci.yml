name: CI

on:
  pull_request:
  push:
    branches: [main]

# 同一分支/PR 的新推送会取消正在运行的旧任务，节省 runner 资源
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 前端：类型检查 / lint / 单测 / 覆盖率门禁 / 构建（等价于 pnpm ci:quick）
  frontend:
    name: Frontend (ci:quick)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quick CI suite
        run: pnpm ci:quick

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

  # 后端：Rust 单元测试（src-tauri/cargo test）
  rust:
    name: Rust (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tauri 2 在 Linux 上编译所需的系统依赖
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            build-essential \
            file

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # tauri-build 需要 frontendDist（../dist）存在；先产出前端构建产物
      - name: Build frontend (for tauri-build)
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Run Rust tests
        run: pnpm test:rust

  # 前端冒烟 E2E：Playwright 浏览器版（不含 Tauri 原生能力）
  e2e:
    name: E2E (Playwright smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # playwright.config.ts 使用 channel: "chrome"，在 CI 中安装 Google Chrome
      - name: Install Chrome for Playwright
        run: pnpm exec playwright install --with-deps chrome

      - name: Run E2E smoke tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7
