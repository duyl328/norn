<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fan Stack Tabs Prototype</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #123c46;
      --line: #f05b68;
      --paper: #fffdf7;
      --shadow: rgba(26, 35, 44, 0.18);
      --rail-height: 118px;
      --tab-height: 62px;
      --stack-step: 26px;
      --radius: 18px;
      font-family: ui-rounded, "Bradley Hand", "Comic Sans MS", "Segoe UI", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 12% 18%, rgba(244, 91, 104, 0.12), transparent 28%),
        radial-gradient(circle at 86% 72%, rgba(78, 179, 205, 0.14), transparent 32%),
        #fffaf3;
      color: var(--ink);
    }

    main {
      width: min(1180px, calc(100vw - 38px));
      display: grid;
      gap: 20px;
    }

    .stage {
      padding: 36px 20px 30px;
      background: rgba(255, 255, 255, 0.58);
      border: 2px solid rgba(18, 60, 70, 0.12);
      border-radius: 24px;
      box-shadow: 0 24px 70px rgba(54, 41, 26, 0.12);
      backdrop-filter: blur(12px);
    }

    .rail {
      position: relative;
      height: var(--rail-height);
      overflow: hidden;
      border: 3px solid var(--ink);
      border-radius: 26px;
      background: var(--paper);
      box-shadow:
        inset 0 0 0 1px rgba(240, 91, 104, 0.08),
        0 14px 28px rgba(32, 23, 16, 0.10);
    }

    .rail::before,
    .rail::after {
      content: "";
      position: absolute;
      top: 8px;
      bottom: 8px;
      width: 108px;
      pointer-events: none;
      z-index: 900;
    }

    .rail::before {
      left: 0;
      background: linear-gradient(90deg, var(--paper) 0%, rgba(255, 253, 247, 0.92) 28%, transparent 100%);
    }

    .rail::after {
      right: 0;
      background: linear-gradient(270deg, var(--paper) 0%, rgba(255, 253, 247, 0.92) 28%, transparent 100%);
    }

    .tab {
      position: absolute;
      top: 27px;
      left: 0;
      width: var(--w);
      height: var(--tab-height);
      border: 3px solid var(--line);
      border-radius: var(--radius);
      display: grid;
      align-items: center;
      padding: 0 22px;
      cursor: pointer;
      user-select: none;
      transform:
        translateX(var(--x, 0px))
        rotate(var(--tilt, 0deg))
        scale(var(--scale, 1));
      transform-origin: center bottom;
      transition:
        transform 560ms cubic-bezier(.2,.84,.22,1),
        width 560ms cubic-bezier(.2,.84,.22,1),
        box-shadow 560ms cubic-bezier(.2,.84,.22,1),
        filter 560ms cubic-bezier(.2,.84,.22,1);
      box-shadow: 0 10px 17px rgba(240, 91, 104, 0.10);
      filter: saturate(var(--sat, 0.92));
    }

    .tab::before,
    .tab::after {
      content: "";
      position: absolute;
      inset: -5px -4px;
      border: 2px solid rgba(240, 91, 104, 0.62);
      border-radius: calc(var(--radius) + 6px);
      pointer-events: none;
      transform: rotate(var(--scribble, .45deg));
    }

    .tab::after {
      inset: -2px -6px -4px -3px;
      opacity: 0.42;
      transform: rotate(calc(var(--scribble, .45deg) * -1));
    }

    .tab.is-active {
      --sat: 1.08;
      border-color: #ea4e5f;
      box-shadow: 0 16px 30px var(--shadow);
    }

    .label {
      position: relative;
      z-index: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 17px;
      font-weight: 760;
      letter-spacing: 0;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      padding: 0 4px;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }

    .buttons {
      display: flex;
      gap: 8px;
    }

    button {
      appearance: none;
      border: 2px solid rgba(18, 60, 70, 0.22);
      border-radius: 8px;
      min-width: 40px;
      height: 38px;
      padding: 0 12px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--ink);
      font: 700 15px/1 ui-sans-serif, system-ui, sans-serif;
      cursor: pointer;
    }

    button:hover {
      border-color: rgba(18, 60, 70, 0.5);
      background: white;
    }

    .note {
      margin: 0;
      color: rgba(18, 60, 70, 0.74);
      font: 14px/1.55 ui-sans-serif, system-ui, sans-serif;
    }

    @media (max-width: 720px) {
      :root {
        --rail-height: 110px;
        --tab-height: 58px;
        --stack-step: 20px;
      }

      .stage {
        padding: 26px 12px 24px;
      }

      .tab {
        top: 25px;
        padding: 0 16px;
      }

      .label {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="stage" aria-label="手写堆叠 Tab 原型">
      <div class="rail" id="rail"></div>
    </section>

    <div class="controls">
      <div class="buttons" aria-label="切换活跃标签">
        <button id="prev" type="button" aria-label="上一个">←</button>
        <button id="next" type="button" aria-label="下一个">→</button>
        <button id="add" type="button">增加</button>
        <button id="remove" type="button">减少</button>
      </div>
      <p class="note">点击任意纸片或使用方向键。中间保持展开，两侧在固定边界内按层级堆叠。</p>
    </div>
  </main>

  <script>
    const rail = document.querySelector("#rail");
    const prevButton = document.querySelector("#prev");
    const nextButton = document.querySelector("#next");
    const addButton = document.querySelector("#add");
    const removeButton = document.querySelector("#remove");

    const palette = ["#b5f0c0", "#9ed2f2", "#eaded4", "#fff0a5", "#fffdf7", "#aee9ba", "#9fd0ef", "#ffe38b"];
    const names = [
      "index.html",
      "workspace-tabs.tsx",
      "painted-border.css",
      "draft-note.md",
      "active-file.ts",
      "layout-engine.js",
      "scroll-model.json",
      "gesture-map.ts",
      "renderer.tsx",
      "preview-panel.html",
      "long-document-name-for-demo.ts"
    ];

    let active = 4;
    let tabs = names.slice(0, 9).map((name, index) => ({
      id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${index}`,
      name,
      color: palette[index % palette.length],
      width: clamp(136 + name.length * 8, 148, 330)
    }));

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function render() {
      rail.replaceChildren(...tabs.map((tab, index) => {
        const button = document.createElement("button");
        button.className = `tab${index === active ? " is-active" : ""}`;
        button.type = "button";
        button.dataset.index = index;
        button.style.background = tab.color;
        button.style.setProperty("--w", `${tab.width}px`);
        button.style.setProperty("--scribble", `${index % 2 ? -0.5 : 0.4}deg`);
        button.innerHTML = `<span class="label">${tab.name}</span>`;
        button.addEventListener("click", () => {
          active = index;
          layout();
        });
        return button;
      }));
      layout();
    }

    function layout() {
      const elements = [...rail.querySelectorAll(".tab")];
      const railWidth = rail.clientWidth;
      const gap = -3;
      const edge = railWidth < 620 ? 14 : 26;
      const stackStep = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--stack-step")) || 26;
      const widths = tabs.map(tab => tab.width);
      const starts = [];
      let cursor = edge;

      for (const width of widths) {
        starts.push(cursor);
        cursor += width + gap;
      }

      const activeCenter = starts[active] + widths[active] / 2;
      const offset = activeCenter - railWidth / 2;
      const leftLock = edge;
      const rightLock = railWidth - edge;

      elements.forEach((element, index) => {
        const width = widths[index];
        const raw = starts[index] - offset;
        let x = raw;
        let sideDepth = 0;

        if (index < active) {
          sideDepth = active - index;
          const stacked = leftLock + index * stackStep;
          x = Math.max(raw, stacked);
        } else if (index > active) {
          sideDepth = index - active;
          const stacked = rightLock - width - (tabs.length - 1 - index) * stackStep;
          x = Math.min(raw, stacked);
        }

        const distance = Math.abs(index - active);
        const edgeStacked = Math.abs(x - raw) > 0.5;
        const z =
          index === active ? 1000 :
          index < active ? 500 + index :
          500 + (tabs.length - index);

        element.classList.toggle("is-active", index === active);
        element.style.zIndex = z;
        element.style.setProperty("--x", `${x}px`);
        element.style.setProperty("--tilt", `${(index - active) * 0.26}deg`);
        element.style.setProperty("--scale", `${edgeStacked ? clamp(1 - sideDepth * 0.018, 0.9, 1) : 1}`);
        element.style.opacity = edgeStacked && distance > 4 ? 0.9 : 1;
      });
    }

    function setActive(next) {
      active = (next + tabs.length) % tabs.length;
      layout();
    }

    prevButton.addEventListener("click", () => setActive(active - 1));
    nextButton.addEventListener("click", () => setActive(active + 1));

    addButton.addEventListener("click", () => {
      const index = tabs.length % names.length;
      tabs.push({
        id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${index}`,
        name: names[index],
        color: palette[index % palette.length],
        width: clamp(136 + names[index].length * 8, 148, 330)
      });
      active = tabs.length - 1;
      render();
    });

    removeButton.addEventListener("click", () => {
      if (tabs.length <= 3) return;
      tabs.splice(active, 1);
      active = clamp(active, 0, tabs.length - 1);
      render();
    });

    window.addEventListener("resize", layout);
    window.addEventListener("keydown", event => {
      if (event.key === "ArrowLeft") setActive(active - 1);
      if (event.key === "ArrowRight") setActive(active + 1);
    });

    render();
  </script>
</body>
</html>
