<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fan Stack Tabs Prototype</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #123c46;
      --line: #f05b68;
      --paper: #fffdf7;
      --shadow: rgba(26, 35, 44, 0.18);
      --rail-height: 118px;
      --tab-height: 62px;
      --stack-step: 26px;
      --radius: 18px;
      font-family: ui-rounded, "Bradley Hand", "Comic Sans MS", "Segoe UI", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 12% 18%, rgba(244, 91, 104, 0.12), transparent 28%),
        radial-gradient(circle at 86% 72%, rgba(78, 179, 205, 0.14), transparent 32%),
        #fffaf3;
      color: var(--ink);
    }

    main {
      width: min(90vw, calc(100vw - 24px));
      min-width: 0;
      display: grid;
      gap: 20px;
    }

    .stage {
      min-width: 0;
      padding: clamp(18px, 3vw, 36px) clamp(10px, 2vw, 20px) clamp(22px, 2.5vw, 30px);
      background: rgba(255, 255, 255, 0.58);
      border: 2px solid rgba(18, 60, 70, 0.12);
      border-radius: 24px;
      box-shadow: 0 24px 70px rgba(54, 41, 26, 0.12);
      backdrop-filter: blur(12px);
    }

    .rail {
      --rail-pad-x: 0px;
      display: flex;
      align-items: center;
      width: 100%;
      min-width: 0;
      height: var(--rail-height);
      overflow-x: auto;
      overflow-y: hidden;
      border: 3px solid var(--ink);
      border-radius: 26px;
      background: var(--paper);
      padding: 0 var(--rail-pad-x);
      scrollbar-width: thin;
      scrollbar-color: rgba(240, 91, 104, 0.7) rgba(18, 60, 70, 0.08);
      box-shadow:
        inset 0 0 0 1px rgba(240, 91, 104, 0.08),
        0 14px 28px rgba(32, 23, 16, 0.10);
    }

    .rail::-webkit-scrollbar {
      height: 10px;
    }

    .rail::-webkit-scrollbar-track {
      background: rgba(18, 60, 70, 0.08);
      border-radius: 999px;
      margin: 0 22px;
    }

    .rail::-webkit-scrollbar-thumb {
      background: rgba(240, 91, 104, 0.72);
      border-radius: 999px;
      border: 2px solid var(--paper);
    }

    .tab {
      position: relative;
      flex: 0 0 auto;
      width: var(--w);
      min-width: 0;
      height: var(--tab-height);
      border: 3px solid var(--line);
      border-radius: var(--radius);
      display: grid;
      align-items: center;
      padding: 0 22px;
      cursor: pointer;
      user-select: none;
      transform-origin: center bottom;
      transition:
        border-color 180ms ease,
        width 560ms cubic-bezier(.2,.84,.22,1),
        box-shadow 560ms cubic-bezier(.2,.84,.22,1),
        filter 560ms cubic-bezier(.2,.84,.22,1);
      box-shadow: 0 10px 17px rgba(240, 91, 104, 0.10);
      filter: saturate(var(--sat, 0.92));
    }

    .tab::before,
    .tab::after {
      content: "";
      position: absolute;
      inset: -5px -4px;
      border-radius: calc(var(--radius) + 6px);
      pointer-events: none;
      transform: rotate(var(--scribble, .45deg));
    }

    .tab::after {
      inset: -2px -6px -4px -3px;
      opacity: 0.42;
      transform: rotate(calc(var(--scribble, .45deg) * -1));
    }

    .tab.is-active {
      --sat: 1.08;
      border-color: #ea4e5f;
      box-shadow: 0 16px 30px var(--shadow);
    }

    .tab.is-sticky {
      position: sticky;
    }

    .tab.is-left-sticky {
      left: calc(var(--sticky-left, 0px) - var(--rail-pad-x));
      right: auto;
    }

    .tab.is-right-sticky {
      left: auto;
      right: calc(var(--sticky-right, 0px) - var(--rail-pad-x));
    }

    .tab.is-left-stacked,
    .tab.is-right-stacked {
      -webkit-mask-image: linear-gradient(90deg, rgba(0, 0, 0, var(--left-alpha, 1)) 0%, #000 50%, rgba(0, 0, 0, var(--right-alpha, 1)) 100%);
      mask-image: linear-gradient(90deg, rgba(0, 0, 0, var(--left-alpha, 1)) 0%, #000 50%, rgba(0, 0, 0, var(--right-alpha, 1)) 100%);
    }

    .label {
      position: relative;
      z-index: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 17px;
      font-weight: 760;
      letter-spacing: 0;
    }

    .tab-id {
      position: absolute;
      left: 7px;
      top: 7px;
      z-index: 2;
      min-width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      border: 2px solid rgba(18, 60, 70, 0.25);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      color: rgba(18, 60, 70, 0.78);
      font: 800 10px/1 ui-sans-serif, system-ui, sans-serif;
    }

    .tab-z {
      position: absolute;
      right: 7px;
      top: 7px;
      z-index: 2;
      min-width: 42px;
      height: 18px;
      display: grid;
      place-items: center;
      border: 2px solid rgba(240, 91, 104, 0.28);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      color: rgba(18, 60, 70, 0.72);
      font: 800 10px/1 ui-sans-serif, system-ui, sans-serif;
    }

    .measure-label {
      position: fixed;
      left: -9999px;
      top: -9999px;
      visibility: hidden;
      white-space: nowrap;
      font-size: 17px;
      font-weight: 760;
      letter-spacing: 0;
      font-family: inherit;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      padding: 0 4px;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }

    .buttons {
      display: flex;
      gap: 8px;
    }

    button {
      appearance: none;
      border: 2px solid rgba(18, 60, 70, 0.22);
      border-radius: 8px;
      min-width: 40px;
      height: 38px;
      padding: 0 12px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--ink);
      font: 700 15px/1 ui-sans-serif, system-ui, sans-serif;
      cursor: pointer;
    }

    button:hover {
      border-color: rgba(18, 60, 70, 0.5);
      background: white;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 38px;
      padding: 0 10px;
      border: 2px solid rgba(18, 60, 70, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.68);
      color: rgba(18, 60, 70, 0.84);
      font: 800 13px/1 ui-sans-serif, system-ui, sans-serif;
      cursor: pointer;
    }

    .toggle input {
      margin: 0;
      accent-color: #f05b68;
    }

    .note {
      margin: 0;
      color: rgba(18, 60, 70, 0.74);
      font: 14px/1.55 ui-sans-serif, system-ui, sans-serif;
    }

    .center-readout {
      min-width: 112px;
      color: rgba(18, 60, 70, 0.86);
      font: 800 15px/1.4 ui-sans-serif, system-ui, sans-serif;
      text-align: right;
    }

    .debug-readout {
      flex-basis: 100%;
      color: rgba(18, 60, 70, 0.78);
      font: 700 13px/1.45 ui-sans-serif, system-ui, sans-serif;
      text-align: right;
    }

    @media (max-width: 720px) {
      :root {
        --rail-height: 110px;
        --tab-height: 58px;
        --stack-step: 20px;
      }

      .stage {
        padding: 26px 12px 24px;
      }

      .tab {
        padding: 0 16px;
      }

      .label {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <main>
    <span class="measure-label" id="measure-label" aria-hidden="true"></span>
    <section class="stage" aria-label="手写堆叠 Tab 原型">
      <div class="rail" id="rail"></div>
    </section>

    <div class="controls">
      <div class="buttons" aria-label="切换活跃标签">
        <button id="prev" type="button" aria-label="上一个">←</button>
        <button id="next" type="button" aria-label="下一个">→</button>
        <button id="add" type="button">增加</button>
        <button id="remove" type="button">减少</button>
      </div>
      <label class="toggle"><input id="auto-move" type="checkbox" checked>自动移动</label>
      <output class="center-readout" id="active-readout">选中 ID: 4</output>
      <output class="center-readout" id="center-readout">中心 ID: 0</output>
      <output class="debug-readout" id="debug-readout">滚动: 0 / 0 | 左距: 0 | 右距: 0</output>
      <p class="note">点击任意纸片或使用方向键。中间保持展开，两侧在固定边界内按层级堆叠。</p>
    </div>
  </main>

  <script>
    const rail = document.querySelector("#rail");
    const prevButton = document.querySelector("#prev");
    const nextButton = document.querySelector("#next");
    const addButton = document.querySelector("#add");
    const removeButton = document.querySelector("#remove");
    const autoMoveInput = document.querySelector("#auto-move");
    const measureLabel = document.querySelector("#measure-label");
    const activeReadout = document.querySelector("#active-readout");
    const centerReadout = document.querySelector("#center-readout");
    const debugReadout = document.querySelector("#debug-readout");
    const stackStep = 20;
    const maxVisibleStack = 6;
    let layoutFrame = 0;
    let scrollAnimationFrame = 0;
    let pendingActiveCleanup = null;

    const palette = ["#b5f0c0", "#9ed2f2", "#eaded4", "#fff0a5", "#fffdf7", "#aee9ba", "#9fd0ef", "#ffe38b"];
    const names = [
      "index.html",
      "workspace-tabs.tsx",
      "painted-border.css",
      "draft-note.md",
      "active-file.ts",
      "layout-engine.js",
      "scroll-model.json",
      "gesture-map.ts",
      "renderer.tsx",
      "preview-panel.html",
      "long-document-name-for-demo.ts"
    ];

    let active = 4;
    let tabs = names.slice(0, 9).map((name, index) => ({
      id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${index}`,
      name,
      color: palette[index % palette.length],
      width: 0
    }));

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function measureTabWidths() {
      const elements = [...rail.querySelectorAll(".tab")];

      elements.forEach((element, index) => {
        const wasCollapsed = element.classList.contains("is-collapsed");
        element.classList.remove("is-collapsed");
        const label = element.querySelector(".label");
        const labelStyle = getComputedStyle(label);
        const style = getComputedStyle(element);
        const border = parseFloat(style.borderLeftWidth) + parseFloat(style.borderRightWidth);
        const padding = parseFloat(style.paddingLeft) + parseFloat(style.paddingRight);
        measureLabel.style.font = labelStyle.font;
        measureLabel.style.letterSpacing = labelStyle.letterSpacing;
        measureLabel.textContent = tabs[index].name;
        tabs[index].width = Math.ceil(Math.max(84, measureLabel.getBoundingClientRect().width + padding + border));
        element.classList.toggle("is-collapsed", wasCollapsed);
      });
    }

    function getStackOverflow(widths, scrollOffset) {
      const style = getComputedStyle(rail);
      const railPadding = parseFloat(style.paddingLeft);
      let cursor = railPadding;
      let overflow = 0;

      widths.forEach((width, index) => {
        if (index >= maxVisibleStack) {
          const triggerScroll = cursor - index * stackStep;
          const rawProgress = (scrollOffset - triggerScroll) / stackStep;

          if (rawProgress > 0) {
            const pushProgress = clamp(rawProgress, 0, 1);
            overflow = Math.max(overflow, index - maxVisibleStack + pushProgress);
          }
        }

        cursor += width;
      });

      return Math.max(0, overflow);
    }

    function scheduleLayout() {
      if (layoutFrame) return;

      layoutFrame = requestAnimationFrame(() => {
        layoutFrame = 0;
        layout();
      });
    }

    function cancelScrollAnimation() {
      if (!scrollAnimationFrame) return;
      cancelAnimationFrame(scrollAnimationFrame);
      scrollAnimationFrame = 0;
    }

    function animateScrollTo(target) {
      cancelScrollAnimation();
      const start = rail.scrollLeft;
      const distance = target - start;
      const duration = 520;
      const startedAt = performance.now();

      if (Math.abs(distance) < 1) {
        rail.scrollLeft = target;
        layout();
        return;
      }

      function tick(now) {
        const progress = clamp((now - startedAt) / duration, 0, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        rail.scrollLeft = start + distance * eased;
        layout();

        if (progress < 1) {
          scrollAnimationFrame = requestAnimationFrame(tick);
        } else {
          scrollAnimationFrame = 0;
        }
      }

      scrollAnimationFrame = requestAnimationFrame(tick);
    }

    function getTabPositions(widths, scrollLeft) {
      const style = getComputedStyle(rail);
      const railPadding = parseFloat(style.paddingLeft);
      const reversedWidths = [...widths].reverse();
      const scrollMax = Math.max(0, rail.scrollWidth - rail.clientWidth);
      const leftStackOverflow = getStackOverflow(widths, scrollLeft);
      const rightStackOverflow = getStackOverflow(reversedWidths, scrollMax - scrollLeft);
      const viewportWidth = rail.clientWidth;
      let cursor = railPadding;
      let reverseCursor = railPadding;
      const rightSlots = [];

      reversedWidths.forEach((width, reversedIndex) => {
        const originalIndex = tabs.length - 1 - reversedIndex;
        const naturalLeft = reverseCursor - (scrollMax - scrollLeft);
        const stickyRight = (reversedIndex - rightStackOverflow) * stackStep;
        rightSlots[originalIndex] = {
          stickyRight,
          right: Math.max(naturalLeft, stickyRight)
        };
        reverseCursor += width;
      });

      return widths.map((width, index) => {
        const naturalLeft = cursor - scrollLeft;
        const naturalRight = naturalLeft + width;
        const stickyLeft = (index - leftStackOverflow) * stackStep;
        const rightSlot = rightSlots[index];
        const isLeftPinned = naturalLeft <= stickyLeft;
        const isRightPinned = naturalRight >= viewportWidth - rightSlot.stickyRight;
        let side = "normal";
        let left = naturalLeft;

        if (isLeftPinned && isRightPinned) {
          side = naturalLeft + width / 2 < viewportWidth / 2 ? "left" : "right";
        } else if (isLeftPinned) {
          side = "left";
        } else if (isRightPinned) {
          side = "right";
        }

        if (side === "left") {
          left = Math.max(naturalLeft, stickyLeft);
        } else if (side === "right") {
          left = viewportWidth - width - rightSlot.right;
        }

        cursor += width;
        return { left, naturalLeft, stickyLeft, stickyRight: rightSlot.stickyRight, side, width };
      });
    }

    function getTabVisibility(index, positions, railPadding) {
      const position = positions[index];
      const previous = positions[index - 1];
      const next = positions[index + 1];
      const tolerance = 2;
      const left = position.left;
      const right = position.left + position.width;
      const visibleStart = railPadding;
      const visibleEnd = rail.clientWidth - railPadding;
      const previousOverlap = previous ? Math.max(0, previous.left + previous.width - left) : 0;
      const nextOverlap = next ? Math.max(0, right - next.left) : 0;
      const coveredByPrevious = position.side === "right" ? previousOverlap : 0;
      const coveredByNext = position.side === "left" ? nextOverlap : 0;
      const insideContainer = left >= visibleStart - tolerance && right <= visibleEnd + tolerance;
      const fullyExpanded = coveredByPrevious <= tolerance && coveredByNext <= tolerance;

      return {
        insideContainer,
        fullyExpanded,
        previousOverlap,
        nextOverlap,
        coveredByPrevious,
        coveredByNext,
        position
      };
    }

    function focusActiveWindow(placement = "center", animated = true) {
      measureTabWidths();
      const style = getComputedStyle(rail);
      const railPadding = parseFloat(style.paddingLeft);
      const widths = tabs.map(tab => tab.width);
      const scrollMax = Math.max(0, rail.scrollWidth - rail.clientWidth);
      let cursor = railPadding;
      let activeStart = railPadding;
      let activeEnd = railPadding;
      let target = 0;

      widths.forEach((width, index) => {
        if (index === active) activeStart = cursor;
        cursor += width;
        if (index === active) activeEnd = cursor;
      });

      function getFocusStepTarget(scrollLeft) {
        const positions = getTabPositions(widths, scrollLeft);
        const visibility = getTabVisibility(active, positions, railPadding);

        if (visibility.insideContainer && visibility.fullyExpanded) {
          return scrollLeft;
        }

        if (activeStart < scrollLeft + railPadding) {
          return activeStart - railPadding;
        }

        if (activeEnd > scrollLeft + rail.clientWidth - railPadding) {
          return activeEnd - rail.clientWidth + railPadding;
        }

        if (visibility.coveredByNext > 2 || visibility.position.side === "left") {
          return scrollLeft - Math.max(stackStep, visibility.coveredByNext);
        }

        if (visibility.coveredByPrevious > 2 || visibility.position.side === "right") {
          return scrollLeft + Math.max(stackStep, visibility.coveredByPrevious);
        }

        return scrollLeft;
      }

      if (placement === "end") {
        target = scrollMax;
      } else {
        target = rail.scrollLeft;

        for (let index = 0; index < 24; index += 1) {
          const nextTarget = clamp(getFocusStepTarget(target), 0, scrollMax);
          if (Math.abs(nextTarget - target) < 0.5) break;
          target = nextTarget;

          const nextPositions = getTabPositions(widths, target);
          const nextVisibility = getTabVisibility(active, nextPositions, railPadding);
          if (nextVisibility.insideContainer && nextVisibility.fullyExpanded) break;
        }
      }

      if (animated) {
        animateScrollTo(target);
      } else {
        cancelScrollAnimation();
        rail.scrollLeft = target;
        layout();
      }
    }

    function cancelPendingActivation() {
      if (!pendingActiveCleanup) return;
      pendingActiveCleanup();
      pendingActiveCleanup = null;
    }

    function activateTabAfterWidthSettles(tabId) {
      cancelPendingActivation();
      const element = [...rail.querySelectorAll(".tab")].find(tab => {
        const tabIndex = Number(tab.dataset.index);
        return tabs[tabIndex]?.id === tabId;
      });

      if (!element) return;

      let done = false;
      const finish = () => {
        if (done) return;
        done = true;
        pendingActiveCleanup = null;
        element.removeEventListener("transitionend", handleTransitionEnd);
        clearTimeout(fallbackTimer);

        const nextIndex = tabs.findIndex(tab => tab.id === tabId);
        if (nextIndex < 0) return;
        active = nextIndex;
        if (autoMoveInput.checked) {
          focusActiveWindow();
        } else {
          layout();
        }
      };
      const handleTransitionEnd = event => {
        if (event.target !== element || event.propertyName !== "width") return;
        finish();
      };
      const fallbackTimer = setTimeout(finish, 700);

      element.addEventListener("transitionend", handleTransitionEnd);
      pendingActiveCleanup = () => {
        done = true;
        element.removeEventListener("transitionend", handleTransitionEnd);
        clearTimeout(fallbackTimer);
      };
    }

    function render() {
      rail.replaceChildren(...tabs.map((tab, index) => {
        const button = document.createElement("button");
        button.className = `tab is-sticky${index === active ? " is-active" : ""}`;
        button.type = "button";
        button.dataset.index = index;
        button.style.background = tab.color;
        button.style.setProperty("--w", `${tab.width}px`);
        button.style.setProperty("--scribble", `${index % 2 ? -0.5 : 0.4}deg`);
        button.innerHTML = `<span class="tab-id">${index}</span><span class="tab-z">z:0</span><span class="label">${tab.name}</span>`;
        button.addEventListener("click", () => {
          setActive(index);
        });
        return button;
      }));
      measureTabWidths();
      layout();
    }

    function layout() {
      const elements = [...rail.querySelectorAll(".tab")];
      measureTabWidths();
      const widths = tabs.map(tab => tab.width);
      const viewportWidth = rail.clientWidth;
      const tabPositions = getTabPositions(widths, rail.scrollLeft);

      const centerLine = viewportWidth / 2;
      const crossingIndex = tabPositions.findIndex(position => (
        position.left <= centerLine && position.left + position.width >= centerLine
      ));
      const visualCenterIndex = crossingIndex >= 0
        ? crossingIndex
        : tabPositions.reduce((bestIndex, position, index) => {
            const center = position.left + position.width / 2;
            const best = tabPositions[bestIndex];
            const bestCenter = best.left + best.width / 2;

            return Math.abs(center - centerLine) < Math.abs(bestCenter - centerLine)
              ? index
              : bestIndex;
          }, 0);
      const zIndexes = tabPositions.map((position, index) => {
        if (index === visualCenterIndex) return 10000;
        if (index < visualCenterIndex) return 1000 + index;
        return 1000 + tabs.length - index;
      });

      elements.forEach((element, index) => {
        const position = tabPositions[index];
        const nextPosition = tabPositions[index + 1];
        const previousPosition = tabPositions[index - 1];
        const coveredWidth = nextPosition ? Math.max(0, position.left + position.width - nextPosition.left) : 0;
        const rightCoveredWidth = previousPosition ? Math.max(0, previousPosition.left + previousPosition.width - position.left) : 0;
        const coverRatio = clamp(coveredWidth / position.width, 0, 1);
        const rightCoverRatio = clamp(rightCoveredWidth / position.width, 0, 1);
        const rightAlpha = position.side === "left" ? 1 - clamp(coverRatio * 2, 0, 1) : 1;
        const leftAlpha = position.side === "right" ? 1 - clamp(rightCoverRatio * 2, 0, 1) : 1;
        const isLeftStacked = rightAlpha < 1;
        const isRightStacked = leftAlpha < 1;
        element.classList.toggle("is-active", index === active);
        element.classList.toggle("is-left-sticky", position.side !== "right");
        element.classList.toggle("is-right-sticky", position.side === "right");
        element.classList.toggle("is-left-stacked", isLeftStacked);
        element.classList.toggle("is-right-stacked", isRightStacked);
        element.style.zIndex = zIndexes[index];
        element.querySelector(".tab-z").textContent = `z:${zIndexes[index]}`;
        element.style.setProperty("--left-alpha", leftAlpha.toFixed(3));
        element.style.setProperty("--right-alpha", rightAlpha.toFixed(3));
        element.style.setProperty("--sticky-left", `${position.stickyLeft}px`);
        element.style.setProperty("--sticky-right", `${position.stickyRight}px`);
        element.style.setProperty("--w", `${tabs[index].width}px`);
      });
      activeReadout.textContent = `选中 ID: ${active}`;
      centerReadout.textContent = `中心 ID: ${visualCenterIndex}`;
      const activePosition = tabPositions[active];
      const scrollMax = Math.max(0, rail.scrollWidth - rail.clientWidth);
      const railPadding = parseFloat(getComputedStyle(rail).paddingLeft);
      const activeVisibility = getTabVisibility(active, tabPositions, railPadding);
      const leftDistance = activePosition.left - railPadding;
      const rightDistance = rail.clientWidth - railPadding - (activePosition.left + activePosition.width);
      const scrollProgress = scrollMax > 0 ? rail.scrollLeft / scrollMax * 100 : 0;
      debugReadout.textContent = [
        `滚动: ${rail.scrollLeft.toFixed(1)} / ${scrollMax.toFixed(1)} (${scrollProgress.toFixed(1)}%)`,
        `左距: ${leftDistance.toFixed(1)}`,
        `右距: ${rightDistance.toFixed(1)}`,
        `区域: ${activePosition.side}`,
        `前遮盖: ${activeVisibility.previousOverlap.toFixed(1)}`,
        `后遮盖: ${activeVisibility.nextOverlap.toFixed(1)}`,
        `被前遮盖: ${activeVisibility.coveredByPrevious.toFixed(1)}`,
        `被后遮盖: ${activeVisibility.coveredByNext.toFixed(1)}`,
        `容器内: ${activeVisibility.insideContainer ? "是" : "否"}`,
        `完全展开: ${activeVisibility.fullyExpanded ? "是" : "否"}`
      ].join(" | ");
    }

    function setActive(next) {
      active = clamp(next, 0, tabs.length - 1);
      if (autoMoveInput.checked) {
        focusActiveWindow();
      } else {
        cancelScrollAnimation();
        layout();
      }
    }

    prevButton.addEventListener("click", () => setActive(active - 1));
    nextButton.addEventListener("click", () => setActive(active + 1));
    rail.addEventListener("wheel", event => {
      const delta = Math.abs(event.deltaX) > Math.abs(event.deltaY) ? event.deltaX : event.deltaY;
      if (delta === 0) return;
      event.preventDefault();
      cancelScrollAnimation();
      rail.scrollLeft += delta;
      scheduleLayout();
    }, { passive: false });
    rail.addEventListener("scroll", scheduleLayout);

    addButton.addEventListener("click", () => {
      const index = tabs.length % names.length;
      const nextTab = {
        id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${index}`,
        name: names[index],
        color: palette[index % palette.length],
        width: 0
      };
      tabs.push(nextTab);
      render();
      activateTabAfterWidthSettles(nextTab.id);
    });

    removeButton.addEventListener("click", () => {
      if (tabs.length <= 3) return;
      cancelPendingActivation();
      tabs.splice(active, 1);
      active = clamp(active, 0, tabs.length - 1);
      render();
      if (autoMoveInput.checked) {
        focusActiveWindow();
      }
    });

    autoMoveInput.addEventListener("change", () => {
      if (!autoMoveInput.checked) cancelScrollAnimation();
      layout();
    });

    window.addEventListener("resize", layout);
    window.addEventListener("keydown", event => {
      if (event.key === "ArrowLeft") setActive(active - 1);
      if (event.key === "ArrowRight") setActive(active + 1);
    });

    render();
  </script>
</body>
</html>
