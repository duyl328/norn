<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fan Stack Tabs Prototype</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #123c46;
      --line: #f05b68;
      --paper: #fffdf7;
      --shadow: rgba(26, 35, 44, 0.18);
      --rail-height: 118px;
      --tab-height: 62px;
      --stack-step: 26px;
      --radius: 18px;
      font-family: ui-rounded, "Bradley Hand", "Comic Sans MS", "Segoe UI", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 12% 18%, rgba(244, 91, 104, 0.12), transparent 28%),
        radial-gradient(circle at 86% 72%, rgba(78, 179, 205, 0.14), transparent 32%),
        #fffaf3;
      color: var(--ink);
    }

    main {
      width: min(90vw, calc(100vw - 24px));
      min-width: 0;
      display: grid;
      gap: 20px;
    }

    .stage {
      min-width: 0;
      padding: clamp(18px, 3vw, 36px) clamp(10px, 2vw, 20px) clamp(22px, 2.5vw, 30px);
      background: rgba(255, 255, 255, 0.58);
      border: 2px solid rgba(18, 60, 70, 0.12);
      border-radius: 24px;
      box-shadow: 0 24px 70px rgba(54, 41, 26, 0.12);
      backdrop-filter: blur(12px);
    }

    .rail {
      --rail-pad-x: 12px;
      display: flex;
      align-items: center;
      width: 100%;
      min-width: 0;
      height: var(--rail-height);
      overflow-x: auto;
      overflow-y: hidden;
      border: 3px solid var(--ink);
      border-radius: 26px;
      background: var(--paper);
      padding: 0 var(--rail-pad-x);
      scrollbar-width: thin;
      scrollbar-color: rgba(240, 91, 104, 0.7) rgba(18, 60, 70, 0.08);
      box-shadow:
        inset 0 0 0 1px rgba(240, 91, 104, 0.08),
        0 14px 28px rgba(32, 23, 16, 0.10);
    }

    .rail::-webkit-scrollbar {
      height: 10px;
    }

    .rail::-webkit-scrollbar-track {
      background: rgba(18, 60, 70, 0.08);
      border-radius: 999px;
      margin: 0 22px;
    }

    .rail::-webkit-scrollbar-thumb {
      background: rgba(240, 91, 104, 0.72);
      border-radius: 999px;
      border: 2px solid var(--paper);
    }

    .tab {
      position: relative;
      flex: 0 0 auto;
      width: var(--w);
      min-width: 0;
      height: var(--tab-height);
      border: 3px solid var(--line);
      border-radius: var(--radius);
      display: grid;
      align-items: center;
      padding: 0 22px;
      cursor: pointer;
      user-select: none;
      transform-origin: center bottom;
      transition:
        border-color 180ms ease,
        width 560ms cubic-bezier(.2,.84,.22,1),
        box-shadow 560ms cubic-bezier(.2,.84,.22,1),
        filter 560ms cubic-bezier(.2,.84,.22,1);
      box-shadow: 0 10px 17px rgba(240, 91, 104, 0.10);
      filter: saturate(var(--sat, 0.92));
    }

    .tab::before,
    .tab::after {
      content: "";
      position: absolute;
      inset: -5px -4px;
      border: 2px solid rgba(240, 91, 104, 0.62);
      border-radius: calc(var(--radius) + 6px);
      pointer-events: none;
      transform: rotate(var(--scribble, .45deg));
    }

    .tab::after {
      inset: -2px -6px -4px -3px;
      opacity: 0.42;
      transform: rotate(calc(var(--scribble, .45deg) * -1));
    }

    .tab.is-active {
      --sat: 1.08;
      border-color: #ea4e5f;
      box-shadow: 0 16px 30px var(--shadow);
    }

    .tab.is-sticky {
      position: sticky;
      left: calc(var(--sticky-left, 0px) - var(--rail-pad-x));
    }

    .tab.is-left-stacked {
      -webkit-mask-image: linear-gradient(90deg, #000 0%, #000 46%, rgba(0, 0, 0, var(--fade-alpha, 1)) 100%);
      mask-image: linear-gradient(90deg, #000 0%, #000 46%, rgba(0, 0, 0, var(--fade-alpha, 1)) 100%);
    }

    .label {
      position: relative;
      z-index: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 17px;
      font-weight: 760;
      letter-spacing: 0;
    }

    .measure-label {
      position: fixed;
      left: -9999px;
      top: -9999px;
      visibility: hidden;
      white-space: nowrap;
      font-size: 17px;
      font-weight: 760;
      letter-spacing: 0;
      font-family: inherit;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      padding: 0 4px;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }

    .buttons {
      display: flex;
      gap: 8px;
    }

    button {
      appearance: none;
      border: 2px solid rgba(18, 60, 70, 0.22);
      border-radius: 8px;
      min-width: 40px;
      height: 38px;
      padding: 0 12px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--ink);
      font: 700 15px/1 ui-sans-serif, system-ui, sans-serif;
      cursor: pointer;
    }

    button:hover {
      border-color: rgba(18, 60, 70, 0.5);
      background: white;
    }

    .note {
      margin: 0;
      color: rgba(18, 60, 70, 0.74);
      font: 14px/1.55 ui-sans-serif, system-ui, sans-serif;
    }

    @media (max-width: 720px) {
      :root {
        --rail-height: 110px;
        --tab-height: 58px;
        --stack-step: 20px;
      }

      .stage {
        padding: 26px 12px 24px;
      }

      .tab {
        padding: 0 16px;
      }

      .label {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <main>
    <span class="measure-label" id="measure-label" aria-hidden="true"></span>
    <section class="stage" aria-label="手写堆叠 Tab 原型">
      <div class="rail" id="rail"></div>
    </section>

    <div class="controls">
      <div class="buttons" aria-label="切换活跃标签">
        <button id="prev" type="button" aria-label="上一个">←</button>
        <button id="next" type="button" aria-label="下一个">→</button>
        <button id="add" type="button">增加</button>
        <button id="remove" type="button">减少</button>
      </div>
      <p class="note">点击任意纸片或使用方向键。中间保持展开，两侧在固定边界内按层级堆叠。</p>
    </div>
  </main>

  <script>
    const rail = document.querySelector("#rail");
    const prevButton = document.querySelector("#prev");
    const nextButton = document.querySelector("#next");
    const addButton = document.querySelector("#add");
    const removeButton = document.querySelector("#remove");
    const measureLabel = document.querySelector("#measure-label");
    const stackStep = 20;
    const maxVisibleStack = 6;
    let layoutFrame = 0;

    const palette = ["#b5f0c0", "#9ed2f2", "#eaded4", "#fff0a5", "#fffdf7", "#aee9ba", "#9fd0ef", "#ffe38b"];
    const names = [
      "index.html",
      "workspace-tabs.tsx",
      "painted-border.css",
      "draft-note.md",
      "active-file.ts",
      "layout-engine.js",
      "scroll-model.json",
      "gesture-map.ts",
      "renderer.tsx",
      "preview-panel.html",
      "long-document-name-for-demo.ts"
    ];

    let active = 4;
    let tabs = names.slice(0, 9).map((name, index) => ({
      id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${index}`,
      name,
      color: palette[index % palette.length],
      width: 0
    }));

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function measureTabWidths() {
      const elements = [...rail.querySelectorAll(".tab")];

      elements.forEach((element, index) => {
        const wasCollapsed = element.classList.contains("is-collapsed");
        element.classList.remove("is-collapsed");
        const label = element.querySelector(".label");
        const labelStyle = getComputedStyle(label);
        const style = getComputedStyle(element);
        const border = parseFloat(style.borderLeftWidth) + parseFloat(style.borderRightWidth);
        const padding = parseFloat(style.paddingLeft) + parseFloat(style.paddingRight);
        measureLabel.style.font = labelStyle.font;
        measureLabel.style.letterSpacing = labelStyle.letterSpacing;
        measureLabel.textContent = tabs[index].name;
        tabs[index].width = Math.ceil(Math.max(84, measureLabel.getBoundingClientRect().width + padding + border));
        element.classList.toggle("is-collapsed", wasCollapsed);
      });
    }

    function getStackOverflow() {
      const style = getComputedStyle(rail);
      const railPadding = parseFloat(style.paddingLeft);
      let cursor = railPadding;
      let overflow = 0;

      tabs.forEach((tab, index) => {
        if (index >= maxVisibleStack) {
          const triggerScroll = cursor - index * stackStep;
          const rawProgress = (rail.scrollLeft - triggerScroll) / stackStep;

          if (rawProgress > 0) {
            const pushProgress = clamp(rawProgress, 0, 1);
            overflow = Math.max(overflow, index - maxVisibleStack + pushProgress);
          }
        }

        cursor += tab.width;
      });

      return Math.max(0, overflow);
    }

    function scheduleLayout() {
      if (layoutFrame) return;

      layoutFrame = requestAnimationFrame(() => {
        layoutFrame = 0;
        layout();
      });
    }

    function render() {
      rail.replaceChildren(...tabs.map((tab, index) => {
        const button = document.createElement("button");
        button.className = `tab is-sticky${index === active ? " is-active" : ""}`;
        button.type = "button";
        button.dataset.index = index;
        button.style.background = tab.color;
        button.style.setProperty("--w", `${tab.width}px`);
        button.style.setProperty("--scribble", `${index % 2 ? -0.5 : 0.4}deg`);
        button.innerHTML = `<span class="label">${tab.name}</span>`;
        button.addEventListener("click", () => {
          setActive(index);
        });
        return button;
      }));
      measureTabWidths();
      layout();
    }

    function layout() {
      const elements = [...rail.querySelectorAll(".tab")];
      measureTabWidths();
      const stackOverflow = getStackOverflow();
      const railPadding = parseFloat(getComputedStyle(rail).paddingLeft);
      let cursor = railPadding;
      const tabPositions = tabs.map((tab, index) => {
        const naturalLeft = cursor - rail.scrollLeft;
        const stickyLeft = (index - stackOverflow) * stackStep;
        const left = Math.max(naturalLeft, stickyLeft);
        const position = { left, naturalLeft, stickyLeft, width: tab.width };
        cursor += tab.width;
        return position;
      });

      elements.forEach((element, index) => {
        const position = tabPositions[index];
        const nextPosition = tabPositions[index + 1];
        const coveredWidth = nextPosition ? Math.max(0, position.left + position.width - nextPosition.left) : 0;
        const coverRatio = clamp(coveredWidth / position.width, 0, 1);
        const fadeProgress = clamp((coverRatio - 0.1) / 0.9, 0, 1);
        const fadeAlpha = 1 - fadeProgress * 0.9;
        const isLeftStacked = fadeProgress > 0;
        element.classList.toggle("is-active", index === active);
        element.classList.toggle("is-left-stacked", isLeftStacked);
        element.style.zIndex = index + 1;
        element.style.setProperty("--fade-alpha", fadeAlpha.toFixed(3));
        element.style.setProperty("--sticky-left", `${position.stickyLeft}px`);
        element.style.setProperty("--w", `${tabs[index].width}px`);
      });
    }

    function setActive(next) {
      active = clamp(next, 0, tabs.length - 1);
      layout();
    }

    prevButton.addEventListener("click", () => setActive(active - 1));
    nextButton.addEventListener("click", () => setActive(active + 1));
    rail.addEventListener("wheel", event => {
      const delta = Math.abs(event.deltaX) > Math.abs(event.deltaY) ? event.deltaX : event.deltaY;
      if (delta === 0) return;
      event.preventDefault();
      rail.scrollLeft += delta;
      scheduleLayout();
    }, { passive: false });
    rail.addEventListener("scroll", scheduleLayout);

    addButton.addEventListener("click", () => {
      const index = tabs.length % names.length;
      tabs.push({
        id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${index}`,
        name: names[index],
        color: palette[index % palette.length],
        width: 0
      });
      active = tabs.length - 1;
      render();
    });

    removeButton.addEventListener("click", () => {
      if (tabs.length <= 3) return;
      tabs.splice(active, 1);
      active = clamp(active, 0, tabs.length - 1);
      render();
    });

    window.addEventListener("resize", layout);
    window.addEventListener("keydown", event => {
      if (event.key === "ArrowLeft") setActive(active - 1);
      if (event.key === "ArrowRight") setActive(active + 1);
    });

    render();
  </script>
</body>
</html>
